<div class="products-container">
  <div class="page-header">
    <div class="header-content">
      <h1>Gestión de Productos</h1>
      <p>Administra el catálogo de productos del inventario</p>
    </div>
    <div class="header-actions">
      <button nz-button nzType="default" (click)="exportToExcel()">
        <span nz-icon nzType="download"></span>
        Exportar
      </button>
      <button nz-button nzType="primary" (click)="addProduct()">
        <span nz-icon nzType="plus"></span>
        Nuevo Producto
      </button>
    </div>
  </div>

  <div class="grid-container">
    <div class="grid-toolbar">
      <nz-input-group [nzPrefix]="prefixIcon" class="search-input">
        <input
          nz-input
          placeholder="Buscar productos..."
          (input)="onQuickFilterChanged($event)"
        />
      </nz-input-group>
      <ng-template #prefixIcon>
        <span nz-icon nzType="search"></span>
      </ng-template>
    </div>

    <ag-grid-angular
      class="ag-theme-alpine"
      style="width: 100%; height: 600px;"
      [rowData]="rowData()"
      [columnDefs]="colDefs"
      [gridOptions]="gridOptions"
      (gridReady)="onGridReady($event)"
    />
  </div>
</div>
