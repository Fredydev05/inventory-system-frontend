<div style="height: 100%; padding: 24px; display: flex; flex-direction: column;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
        <div>
            <h1 style="font-size: 24px; font-weight: 600;">Facturas de Venta</h1>
        </div>
        <button nz-button nzType="primary"><span nz-icon nzType="plus"></span>Nueva Factura</button>
    </div>
    <ag-grid-angular class="ag-theme-alpine" style="width: 100%; height: 600px;" [rowData]="rowData()"
        [columnDefs]="colDefs" [gridOptions]="gridOptions" />
</div>
