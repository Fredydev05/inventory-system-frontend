<div class="purchases-container">
  <div class="page-header">
    <div class="header-content">
      <h1>Compras</h1>
      <p>Historial de órdenes de compra a proveedores</p>
    </div>
    <div class="header-actions">
      <button nz-button nzType="primary">
        <span nz-icon nzType="plus"></span>
        Nueva Orden
      </button>
    </div>
  </div>

  <div class="grid-container">
    <div class="grid-toolbar">
      <nz-input-group [nzPrefix]="prefixIcon" class="search-input">
        <input
          nz-input
          placeholder="Buscar compras..."
          (input)="onQuickFilterChanged($event)"
        />
      </nz-input-group>
      <ng-template #prefixIcon>
        <span nz-icon nzType="search"></span>
      </ng-template>
    </div>

    <div class="table-layout">
      <div class="table-panel">
        <ng-container *ngIf="loading(); else purchasesGrid">
          <div class="table-scroll">
            <div class="table-skeleton">
              <nz-skeleton [nzActive]="true" [nzParagraph]="{ rows: 10 }"></nz-skeleton>
            </div>
          </div>
        </ng-container>

        <ng-template #purchasesGrid>
          <div class="table-scroll">
            <ag-grid-angular
              class="ag-theme-alpine purchases-grid"
              [rowData]="rowData()"
              [columnDefs]="colDefs"
              [gridOptions]="gridOptions"
              (gridReady)="onGridReady($event)"
            />
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
